header:
  version: 14

machine: asterquanta-qemux86-64
distro: asterquanta

target:
  - asterquanta-image

env:
  KAS_TARGET: asterquanta-image

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    branch: scarthgap

  meta-rust:
    url: https://github.com/meta-rust/meta-rust.git
    branch: master

  meta-asterquanta:
    path: meta-asterquanta
    layers:
      meta-asterquanta:

# Build:
#   pip3 install kas
#   kas build kas-asterquanta.yml
# Test sans materiel:
#   kas shell kas-asterquanta.yml -c "runqemu asterquanta-image asterquanta-qemux86-64 nographic"
