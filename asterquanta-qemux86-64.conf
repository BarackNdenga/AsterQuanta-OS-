# Cible v1: x86_64 virtualise (QEMU), testable sans materiel reel.
# Portage futur: se baser sur meta-raspberrypi (ARM) en gardant les
# memes recettes recipes-aqm/* (elles sont independantes de l'archi).

require conf/machine/qemux86-64.conf

MACHINE_FEATURES:append = " efi"
PREFERRED_PROVIDER_virtual/bootloader = "grub-efi"
EFI_PROVIDER = "grub-efi"

# Partitionnement A/B + recovery + data (voir wic/asterquanta-ab.wks.in)
WKS_FILE = "asterquanta-ab.wks.in"

# RAUC: identifiant de compatibilite pour verifier qu'un bundle correspond
# bien a cette machine avant toute installation
RAUC_SLOT_COMPATIBLE = "asterquanta-qemux86-64"
